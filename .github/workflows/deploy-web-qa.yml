name: Deploy Web to Cloud Run (QA)

on:
  push:
    branches:
      - release/qa
    paths:
      - "apps/web/**"
      - "packages/frontend/**"
      - "packages/core/utils/**"
      - "apps/web/Dockerfile"
      - ".github/workflows/deploy-web-qa.yml"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

permissions:
  contents: read
  id-token: write

env:
  SERVICE_NAME: cottonbro-web
  DOCKERFILE: apps/web/Dockerfile
  IMAGE_PORT: 5173

  GCP_PROJECT_ID: cottonbro-dev
  REGION: europe-west1
  REGISTRY: europe-west1-docker.pkg.dev

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  deploy-qa-web:
    runs-on: ubuntu-latest
    needs: test
    environment: qa

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Load web Firebase config from Secret Manager
        run: |
          load_secret() {
            env_name="$1"
            secret_name="$2"
            if ! value="$(gcloud secrets versions access latest --project="$GCP_PROJECT_ID" --secret="$secret_name")"; then
              echo "::error::Unable to access Secret Manager secret $secret_name"
              exit 1
            fi
            if [ -z "$value" ]; then
              echo "::error::Secret Manager secret $secret_name is empty"
              exit 1
            fi
            echo "$env_name=$value" >> "$GITHUB_ENV"
          }

          load_secret NEXT_PUBLIC_FIREBASE_API_KEY web-firebase-api-key
          load_secret NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN web-firebase-auth-domain
          load_secret NEXT_PUBLIC_FIREBASE_PROJECT_ID web-firebase-project-id
          load_secret NEXT_PUBLIC_FIREBASE_APP_ID web-firebase-app-id
          load_secret NEXT_PUBLIC_ASSETS_BASE_URL web-assets-url

      - name: Configure Docker auth for Artifact Registry
        run: |
          gcloud auth configure-docker "$REGISTRY" --quiet

      - name: Build web image
        run: |
          IMAGE="$REGISTRY/$GCP_PROJECT_ID/web/$SERVICE_NAME:${{ github.sha }}"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          docker build \
            --build-arg APP_ENV=qa \
            --build-arg NEXT_PUBLIC_APP_ENV=qa \
            --build-arg API_BASE_URL=${{ secrets.QA_WEB_API_BASE_URL }} \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="$NEXT_PUBLIC_FIREBASE_API_KEY" \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="$NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN" \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="$NEXT_PUBLIC_FIREBASE_PROJECT_ID" \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID="$NEXT_PUBLIC_FIREBASE_APP_ID" \
            --build-arg NEXT_PUBLIC_ASSETS_BASE_URL="$NEXT_PUBLIC_ASSETS_BASE_URL" \
            --build-arg NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.QA_WEB_TURNSTILE_SITE_KEY }} \
            -f "$DOCKERFILE" \
            -t "$IMAGE" \
            .

      - name: Push web image
        run: |
          docker push "$IMAGE"

      - name: Deploy web to Cloud Run (QA)
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --project "$GCP_PROJECT_ID" \
            --region "$REGION" \
            --platform managed \
            --image "$IMAGE" \
            --service-account "${{ secrets.RUNTIME_SA }}" \
            --allow-unauthenticated \
            --port "$IMAGE_PORT" \
            --set-env-vars NODE_ENV=production \
            --set-env-vars APP_ENV=qa \
            --set-env-vars NEXT_PUBLIC_APP_ENV=qa \
            --set-env-vars API_BASE_URL=${{ secrets.QA_WEB_API_BASE_URL }} \
            --set-env-vars NEXT_PUBLIC_FIREBASE_API_KEY="$NEXT_PUBLIC_FIREBASE_API_KEY" \
            --set-env-vars NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="$NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN" \
            --set-env-vars NEXT_PUBLIC_FIREBASE_PROJECT_ID="$NEXT_PUBLIC_FIREBASE_PROJECT_ID" \
            --set-env-vars NEXT_PUBLIC_FIREBASE_APP_ID="$NEXT_PUBLIC_FIREBASE_APP_ID" \
            --set-env-vars NEXT_PUBLIC_ASSETS_BASE_URL="$NEXT_PUBLIC_ASSETS_BASE_URL" \
            --set-env-vars NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.QA_WEB_TURNSTILE_SITE_KEY }}

      - name: Show service URL
        run: |
          gcloud run services describe "$SERVICE_NAME" \
            --region "$REGION" \
            --format='value(status.url)'

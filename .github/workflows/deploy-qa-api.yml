name: Deploy API to Cloud Run (QA)

on:
  # workflow runs on push to this branch and changes to these file paths
  push:
    branches:
      - release/qa
    paths:
      - "apps/api/**"
      - "packages/backend/**"
      - "apps/api/Dockerfile"
      - ".github/workflows/deploy-qa-api.yml"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

# contents: read allows checkout and reading repo contents.
# id-token: write ets GitHub mint an OIDC token that Google Cloud can trust for Workload Identity Federation (WIF).
# That’s how you authenticate to GCP without storing a long-lived JSON key in GitHub.
# WIF - a secure method allowing external workloads in GCP
# OIDC token - used to identify user, repo, workflow, commit hash
permissions:
  contents: read
  id-token: write

env:
  # global envs used in workflow
  SERVICE_NAME: cottonbro-api
  DOCKERFILE: apps/api/Dockerfile
  GCP_PROJECT_ID: cottonbro-dev
  REGION: europe-west1
  # artifact registry for that region
  REGISTRY: europe-west1-docker.pkg.dev
  GMP_SIDECAR_IMAGE: us-docker.pkg.dev/cloud-ops-agents-artifacts/cloud-run-gmp-sidecar/cloud-run-gmp-sidecar:1.2.0

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      # run tests
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  deploy-qa-api:
    runs-on: ubuntu-22.04
    # this job needs test to run before we can get to it
    needs: test
    # use env-level secrets from "qa" environment
    environment: qa

    steps:
      # downloads repo code onto runner
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

        # GitHub mints an OIDC token, Google trusts it via WIF, and impersonates the GCP service account.
        # no need to store json key in github
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          # email of the GCP service account that GitHub will impersonate
          # service account has permissions for pushing to artifact registry, deploying & updating cloud run services
          # & reading secret manager secrets
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

          # install ,set google cloud cli and set project
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

        # writes docker credential helper config so docker push can authenticate to registry
      - name: Configure Docker auth for Artifact Registry
        run: |
          gcloud auth configure-docker "$REGISTRY" --quiet

        # build docker image and tag it with commit SHA
      - name: Build API image
        run: |
          echo "REGISTRY=$REGISTRY"
          echo "GCP_PROJECT_ID=$GCP_PROJECT_ID"
          IMAGE="$REGISTRY/$GCP_PROJECT_ID/api/$SERVICE_NAME:${{ github.sha }}"
          echo "Using image: $IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          docker build \
            -f "$DOCKERFILE" \
            -t "$IMAGE" \
            .

      # push docker image
      - name: Push API image
        run: |
          docker push "$IMAGE"

      - name: Run database migrations (QA)
        run: |
          DATABASE_URL="$(gcloud secrets versions access latest \
            --project "$GCP_PROJECT_ID" \
            --secret api-database-url)"
          DATABASE_URL="$DATABASE_URL" pnpm --filter @cottonbro/api db:migrate



      # RUNTIME_SA is the service account that your Cloud Run service runs as at runtime
      # Creates or updates a Cloud Run service named cottonbro-api
      # targets project called cottonbro-dev in region
      # Deploys the container image just built and pushed
      # allow unauthenticated makes the service publicly invokable
      # set-env-vars set env values
      # set-secrets binds secret Manager secrets into the service as environment variables
      - name: Deploy API to Cloud Run (QA)
        run: |
          cat > cloud-run-api-service.yaml <<EOF
          apiVersion: serving.knative.dev/v1
          kind: Service
          metadata:
            name: $SERVICE_NAME
            annotations:
              run.googleapis.com/launch-stage: ALPHA
              run.googleapis.com/cpu-throttling: "false"
              run.googleapis.com/secrets: api-prometheus-run-monitoring:projects/cottonbro-dev/secrets/api-prometheus-run-monitoring
          spec:
            template:
              metadata:
                annotations:
                  run.googleapis.com/execution-environment: gen2
                  run.googleapis.com/container-dependencies: '{"collector":["app"]}'
              spec:
                serviceAccountName: ${{ secrets.RUNTIME_SA }}
                volumes:
                  - name: prometheus-config
                    secret:
                      secretName: api-prometheus-run-monitoring
                      items:
                        - key: latest
                          path: config.yaml
                containers:
                  - name: app
                    image: $IMAGE
                    ports:
                      - containerPort: 8080
                    resources:
                      limits:
                        memory: 512Mi
                    env:
                      - name: NODE_ENV
                        value: production
                      - name: APP_ENV
                        value: qa
                      - name: PROMETHEUS_METRICS_ENABLED
                        value: "true"
                      - name: CORS_ORIGINS
                        value: "${{ secrets.QA_API_CORS_ORIGINS }}"
                      - name: FIREBASE_PROJECT_ID
                        valueFrom:
                          secretKeyRef:
                            name: api-firebase-project-id
                            key: latest
                      - name: FIREBASE_ADMIN_JSON
                        valueFrom:
                          secretKeyRef:
                            name: api-firebase-admin-json
                            key: latest
                      - name: DATABASE_URL
                        valueFrom:
                          secretKeyRef:
                            name: api-database-url
                            key: latest
                      - name: TURNSTILE_SECRET
                        valueFrom:
                          secretKeyRef:
                            name: api-turnstile-secret
                            key: latest
                      - name: SMTP_USER
                        valueFrom:
                          secretKeyRef:
                            name: api-smtp-user
                            key: latest
                      - name: SMTP_PASS
                        valueFrom:
                          secretKeyRef:
                            name: api-smtp-pass
                            key: latest
                      - name: SMTP_HOST
                        valueFrom:
                          secretKeyRef:
                            name: api-smtp-host
                            key: latest
                      - name: SMTP_PORT
                        valueFrom:
                          secretKeyRef:
                            name: api-smtp-port
                            key: latest
                      - name: SMTP_FROM
                        valueFrom:
                          secretKeyRef:
                            name: api-smtp-user
                            key: latest
                      - name: R2_ACCOUNT_ID
                        valueFrom:
                          secretKeyRef:
                            name: api-r2-account-id
                            key: latest
                      - name: R2_ACCESS_KEY_ID
                        valueFrom:
                          secretKeyRef:
                            name: api-r2-access-key-id
                            key: latest
                      - name: R2_SECRET_ACCESS_KEY
                        valueFrom:
                          secretKeyRef:
                            name: api-r2-secret-access-key
                            key: latest
                      - name: R2_BUCKET
                        valueFrom:
                          secretKeyRef:
                            name: api-r2-bucket
                            key: latest
                      - name: R2_PUBLIC_BASE_URL
                        valueFrom:
                          secretKeyRef:
                            name: web-assets-url
                            key: latest
                      - name: PYTHON_API_KEY
                        valueFrom:
                          secretKeyRef:
                            name: python-api-key
                            key: latest
                      - name: PYTHON_SERVICE_URL
                        valueFrom:
                          secretKeyRef:
                            name: python-service-url
                            key: latest
                      - name: WEB_BASE_URL
                        valueFrom:
                          secretKeyRef:
                            name: web-base-url
                            key: latest
                  - name: collector
                    image: $GMP_SIDECAR_IMAGE
                    resources:
                      limits:
                        memory: 128Mi
                    volumeMounts:
                      - name: prometheus-config
                        mountPath: /etc/rungmp
          EOF

          gcloud run services replace cloud-run-api-service.yaml \
            --project "$GCP_PROJECT_ID" \
            --region "$REGION"

          gcloud run services add-iam-policy-binding "$SERVICE_NAME" \
            --project "$GCP_PROJECT_ID" \
            --region "$REGION" \
            --member="allUsers" \
            --role="roles/run.invoker" \
            --quiet

        # Prints the service’s public URL
      - name: Show service URL
        run: |
          gcloud run services describe "$SERVICE_NAME" \
            --region "$REGION" \
            --format='value(status.url)'
